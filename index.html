}

// ── Members Page ──────────────────────────────────────────────
function MembersPage({state,isAdmin,dispatch,toast}){
  const{members,transactions,monthlyAmount,monthlyContributions}=state;
  const[showAdd,setShowAdd]=useState(false);
  const[editM,setEditM]=useState(null);
  const tm=tmk();const now=new Date();

  const getMemberTotal=id=>transactions.filter(t=>['contribution','deposit'].includes(t.txType)&&t.memberId===id).reduce((s,t)=>s+t.amount,0);
  const isPaid=id=>!!monthlyContributions[`${tm}-${id}`];

  const markPaid=m=>{
    dispatch({type:'ADD_TX',payload:{txType:'contribution',memberId:m.id,memberName:m.name,amount:monthlyAmount,date:today(),description:`${m.name} — ${MONTHS[now.getMonth()]} contribution`,monthKey:`${tm}-${m.id}`}});
    toast(`${m.name} marked as paid`);
  };
  const remove=m=>{
    if(!confirm(`Remove ${m.name}?`))return;
    dispatch({type:'REMOVE_MEMBER',payload:m.id});toast(`${m.name} removed`);
  };

  return(
    <div>
      <div className="flex items-center justify-between mb-6">
        <div className="section-title" style={{margin:0}}>Fund <span className="accent">Members</span> ({members.length})</div>
        {isAdmin&&<button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}><Icon n="plus" s={13}/> Add Member</button>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
        {members.map(m=>{
          const total=getMemberTotal(m.id);
          const paid=isPaid(m.id);
          const cnt=transactions.filter(t=>t.txType==='contribution'&&t.memberId===m.id).length;
          return(
            <div key={m.id} className="card" style={{padding:18,borderColor:paid?'rgba(59,130,246,0.2)':'var(--border)'}}>
              <div className="flex items-center gap-4" style={{flexWrap:'wrap'}}>
                <Avatar member={m} size={50} radius={13}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,marginBottom:2}}>{m.name}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>Joined {m.joined} · {cnt} contributions</div>
                  <div className="progress-wrap mt-2" style={{maxWidth:180}}><div className="progress-bar" style={{width:`${Math.min((total/(monthlyAmount*12))*100,100)}%`,background:`linear-gradient(90deg,${m.color},${m.color}88)`}}/></div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'Syne',fontWeight:800,fontSize:19,color:m.color}}>{fmt(total)}</div>
                  <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>total contributed</div>
                  <span className={`badge ${paid?'badge-green':'badge-red'}`}>{paid?'✓ Paid':'✗ Pending'}</span>
                </div>
                {isAdmin&&(
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {!paid&&<button className="btn btn-success btn-sm" onClick={()=>markPaid(m)}>Mark Paid</button>}
                    <button className="btn btn-ghost btn-sm" onClick={()=>setEditM(m)}><Icon n="edit" s={12}/> Edit</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>remove(m)}><Icon n="trash" s={12}/></button>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
      {showAdd&&<MemberModal dispatch={dispatch} toast={toast} onClose={()=>setShowAdd(false)} members={members}/>}
      {editM&&<MemberModal member={editM} dispatch={dispatch} toast={toast} onClose={()=>setEditM(null)} members={members}/>}
    </div>
  );
}

function MemberModal({member,dispatch,toast,onClose,members}){
  const editing=!!member;
  const[name,setName]=useState(member?.name||'');
  const[emoji,setEmoji]=useState(member?.emoji||'🦁');
  const[color,setColor]=useState(member?.color||'#3b82f6');
  const[photo,setPhoto]=useState(member?.photo||null);
  const[photoUrl,setPhotoUrl]=useState(typeof member?.photo==='string'&&member?.photo.startsWith('http')?member.photo:'');
  const[tab,setTab]=useState(member?.photo?(member.photo.startsWith('data:'))?'upload':'url':'emoji');
  const fileRef=useRef();
  const handleFile=async e=>{const f=e.target.files[0];if(!f)return;try{const d=await readFile(f);setPhoto(d);}catch{}};
  const finalPhoto=tab==='upload'?photo:tab==='url'&&photoUrl?photoUrl:null;
  const preview={id:0,name:name||'Preview',emoji,color,photo:finalPhoto};
  const submit=()=>{
    if(!name.trim())return;
    if(editing){dispatch({type:'UPDATE_MEMBER',payload:{id:member.id,name:name.trim(),emoji,color,photo:finalPhoto}});toast(`${name} updated`);}
    else{
      const now=new Date();
      dispatch({type:'ADD_MEMBER',payload:{id:Date.now(),name:name.trim(),emoji,color,photo:finalPhoto,joined:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`}});
      toast(`${name} added`);
    }
    onClose();
  };
  return(
    <Modal title={editing?'✏️ Edit Member':'👤 Add Member'} onClose={onClose} wide>
      <div style={{display:'flex',gap:14,marginBottom:14}}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}><Avatar member={preview} size={64} radius={16}/><div style={{fontSize:10,color:'var(--text3)'}}>Preview</div></div>
        <div style={{flex:1}}>
          <div className="mb-3"><label className="label">Name</label><input className="input" placeholder="Member name" value={name} onChange={e=>setName(e.target.value)} autoFocus={!editing}/></div>
          <div><label className="label">Color</label><div style={{display:'flex',gap:7,flexWrap:'wrap'}}>{COLORS.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:26,height:26,borderRadius:8,background:c,cursor:'pointer',border:`3px solid ${color===c?'white':'transparent'}`,transition:'border .12s'}}/>)}</div></div>
        </div>
      </div>
      <div className="mb-4">
        <label className="label">Profile Photo</label>
        <div style={{display:'flex',gap:6,marginBottom:10}}>{['emoji','upload','url'].map(t=><button key={t} className={`btn btn-sm ${tab===t?'btn-primary':'btn-ghost'}`} onClick={()=>setTab(t)}>{t==='emoji'?'Emoji':t==='upload'?'Upload':'URL'}</button>)}</div>
        {tab==='emoji'&&<div style={{display:'flex',gap:7,flexWrap:'wrap'}}>{EMOJIS.map(e=><div key={e} onClick={()=>setEmoji(e)} style={{width:38,height:38,borderRadius:10,background:emoji===e?'rgba(59,130,246,0.15)':'rgba(255,255,255,0.04)',border:`2px solid ${emoji===e?'var(--g1)':'var(--border)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,cursor:'pointer'}}>{e}</div>)}</div>}
        {tab==='upload'&&<div className="upload-area" onClick={()=>fileRef.current?.click()}>{photo&&photo.startsWith('data:')?<img src={photo} style={{width:72,height:72,borderRadius:10,objectFit:'cover'}}/>:<><Icon n="upload" s={22} c="var(--text3)"/><div style={{fontSize:13,color:'var(--text3)',marginTop:6}}>Click to upload</div></>}<input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/></div>}
        {tab==='url'&&<input className="input" placeholder="https://example.com/photo.jpg" value={photoUrl} onChange={e=>setPhotoUrl(e.target.value)}/>}
      </div>
      <div style={{display:'flex',gap:10}}><button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button><button className="btn btn-primary" style={{flex:1}} onClick={submit}>{editing?'Save Changes':'Add Member'}</button></div>
    </Modal>
  );
}

// ── Loans Page ────────────────────────────────────────────────
function LoansPage({state,isAdmin,dispatch,toast}){
  const{loans=[],members,transactions}=state;
  const[showAdd,setShowAdd]=useState(false);
  const activeLoans=loans.filter(l=>l.status==='active');
  const settled=loans.filter(l=>l.status==='settled');
  const totalOut=activeLoans.reduce((s,l)=>s+(l.amount-(l.paidAmount||0)),0);

  return(
    <div>
      <div className="flex items-center justify-between mb-6">
        <div className="section-title" style={{margin:0}}>💳 Loan <span className="accent">Tracker</span></div>
        {isAdmin&&<button className="btn btn-purple btn-sm" onClick={()=>setShowAdd(true)}><Icon n="plus" s={13}/> New Loan</button>}
      </div>

      {totalOut>0&&(
        <div className="card mb-6" style={{borderColor:'rgba(167,139,250,0.3)',background:'rgba(167,139,250,0.05)'}}>
          <div style={{fontSize:11,color:'var(--text2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Total Outstanding</div>
          <div style={{fontFamily:'Syne',fontSize:36,fontWeight:800,color:'var(--purple)'}}>{fmt(totalOut)}</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>{activeLoans.length} active loan{activeLoans.length!==1?'s':''}</div>
        </div>
      )}

      {activeLoans.length>0&&(
        <>
          <div className="section-title" style={{fontSize:15}}>Active Loans</div>
          {activeLoans.map(l=>{
            const remaining=l.amount-(l.paidAmount||0);
            const prog=((l.paidAmount||0)/l.amount)*100;
            return(
              <div key={l.id} className="loan-card">
                <div className="flex items-center justify-between mb-2">
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    {members.find(m=>m.id===l.borrowerId)&&<Avatar member={members.find(m=>m.id===l.borrowerId)} size={32} radius={8}/>}
                    <div>
                      <div style={{fontWeight:700,fontFamily:'Syne',fontSize:14}}>{l.borrowerName||'Unknown'}</div>
                      <div style={{fontSize:11,color:'var(--text2)'}}>{l.date}{l.note?` · ${l.note}`:''}</div>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'Syne',fontWeight:800,color:'var(--purple)',fontSize:16}}>{fmt(remaining)}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>of {fmt(l.amount)}</div>
                  </div>
                </div>
                <div className="progress-wrap mb-2"><div className="progress-bar" style={{width:`${prog}%`,background:'linear-gradient(90deg,var(--purple),#c4b5fd)'}}/></div>
                {isAdmin&&(
                  <div style={{display:'flex',gap:8,marginTop:8}}>
                    <button className="btn btn-success btn-sm" onClick={()=>{
                      const amt=prompt(`Repayment amount for ${l.borrowerName} (max ${fmt(remaining)}):`);
                      if(!amt)return;
                      const n=Number(amt);
                      if(!n||n<=0||n>remaining)return toast('Invalid amount');
                      dispatch({type:'REPAY_LOAN',payload:{id:l.id,amount:n}});
                      dispatch({type:'ADD_TX',payload:{txType:'loan_repay',memberId:l.borrowerId,memberName:l.borrowerName,amount:n,date:today(),description:`✅ Repayment from ${l.borrowerName}`}});
                      toast('Repayment recorded');
                    }}>Record Repayment</button>
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}

      {settled.length>0&&(
        <>
          <div className="section-title mt-4" style={{fontSize:15}}>Settled Loans</div>
          {settled.map(l=>(
            <div key={l.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:'rgba(16,185,129,0.04)',border:'1px solid rgba(16,185,129,0.15)',borderRadius:12,marginBottom:8}}>
              {members.find(m=>m.id===l.borrowerId)&&<Avatar member={members.find(m=>m.id===l.borrowerId)} size={30} radius={7}/>}
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{l.borrowerName}</div><div style={{fontSize:11,color:'var(--text2)'}}>{l.date}</div></div>
              <span className="badge badge-green">✓ Settled</span>
              <div style={{fontFamily:'Syne',fontWeight:800,fontSize:14,color:'var(--green2)'}}>{fmt(l.amount)}</div>
            </div>
          ))}
        </>
      )}

      {loans.length===0&&<div className="empty"><div className="empty-icon">🤝</div><div>No loans recorded yet</div></div>}
      {showAdd&&<AddTxModal state={state} dispatch={dispatch} onClose={()=>setShowAdd(false)} toast={toast} defaultType="loan_given"/>}
    </div>
  );
}

// ── History Page ──────────────────────────────────────────────
function HistoryPage({state,isAdmin,dispatch,toast}){
  const{transactions}=state;
  const[filter,setFilter]=useState('all');
  let running=0;
  const withBal=transactions.map(tx=>{const isIn=['contribution','deposit','loan_repay'].includes(tx.txType);running+=isIn?tx.amount:-tx.amount;return{...tx,running,isIn}});
  const filtered=withBal.filter(t=>filter==='all'||t.txType===filter).reverse();
  return(
    <div>
      <div className="flex items-center justify-between mb-6" style={{flexWrap:'wrap',gap:12}}>
        <div className="section-title" style={{margin:0}}>Transaction <span className="accent">History</span></div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {['all','contribution','deposit','expense','withdrawal','loan_given','loan_repay'].map(f=>(
            <button key={f} className={`btn btn-sm ${filter===f?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(f)} style={{fontSize:11}}>
              {f==='all'?'All':TX_TYPES[f]?.label||f}
            </button>
          ))}
        </div>
      </div>
      <div className="card">
        {filtered.length===0
          ?<div className="empty"><div className="empty-icon">📭</div><div>No transactions found</div></div>
          :<div className="table-wrap">
            <table>
              <thead><tr><th>Date</th><th>Description</th><th>Type</th><th style={{textAlign:'right'}}>Amount</th><th style={{textAlign:'right'}}>Balance</th>{isAdmin&&<th></th>}</tr></thead>
              <tbody>
                {filtered.map((tx,i)=>{
                  const cfg=TX_TYPES[tx.txType]||TX_TYPES.contribution;
                  return(
                    <tr key={i}>
                      <td style={{color:'var(--text2)',whiteSpace:'nowrap',fontSize:12}}>{tx.date}</td>
                      <td style={{fontWeight:500}}>{tx.description}</td>
                      <td><span className={`badge ${cfg.badge}`}>{cfg.icon} {cfg.label}</span></td>
                      <td style={{textAlign:'right',fontFamily:'Syne',fontWeight:700,color:tx.isIn?'var(--green2)':'var(--red2)'}}>{cfg.sign}{fmt(tx.amount)}</td>
                      <td style={{textAlign:'right',fontFamily:'Syne',fontWeight:600,color:'var(--text2)',fontSize:13}}>{fmt(tx.running)}</td>
                      {isAdmin&&<td><button className="btn btn-danger btn-icon btn-sm" onClick={()=>{if(confirm('Delete this transaction?')){dispatch({type:'DELETE_TX',payload:tx.id});toast('Deleted');}}}><Icon n="trash" s={12}/></button></td>}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        }
      </div>
    </div>
  );
}

// ── Export Page ───────────────────────────────────────────────
function ExportPage({state,isAdmin,dispatch,toast}){
  const[importing,setImporting]=useState(false);
  const fileRef=useRef();
  const{transactions,members,loans=[]}=state;
  const balance=transactions.reduce((s,t)=>['contribution','deposit','loan_repay'].includes(t.txType)?s+t.amount:s-t.amount,0);

  // JSON Export (full backup)
  const exportJSON=()=>{
    const data=JSON.stringify(state,null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`a2dv-fund-backup-${today()}.json`;a.click();
    URL.revokeObjectURL(url);toast('JSON backup downloaded!');
  };

  // CSV Export
  const exportCSV=()=>{
    const header=['Date','Description','Type','Amount','Balance','Member'];
    let running=0;
    const rows=transactions.map(tx=>{
      const isIn=['contribution','deposit','loan_repay'].includes(tx.txType);
      running+=isIn?tx.amount:-tx.amount;
      return[tx.date,`"${tx.description}"`,TX_TYPES[tx.txType]?.label||tx.txType,(isIn?'+':'-')+tx.amount,running,tx.memberName||''];
    });
    const csv=[header,...rows].map(r=>r.join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`a2dv-transactions-${today()}.csv`;a.click();
    URL.revokeObjectURL(url);toast('CSV downloaded!');
  };

  // PDF Export (via print)
  const exportPDF=()=>{
    const totalIn=transactions.filter(t=>['contribution','deposit','loan_repay'].includes(t.txType)).reduce((s,t)=>s+t.amount,0);
    const totalOut=transactions.filter(t=>['expense','withdrawal','loan_given'].includes(t.txType)).reduce((s,t)=>s+t.amount,0);
    let running=0;
    const txRows=transactions.slice(-50).map(tx=>{
      const isIn=['contribution','deposit','loan_repay'].includes(tx.txType);
      running+=isIn?tx.amount:-tx.amount;
      return`<tr><td>${tx.date}</td><td>${tx.description}</td><td>${TX_TYPES[tx.txType]?.label||''}</td><td style="color:${isIn?'#10b981':'#ef4444'}">${isIn?'+':'-'}${fmt(tx.amount)}</td><td>${fmt(running)}</td></tr>`;
    }).join('');
    const memberRows=members.map(m=>{
      const tot=transactions.filter(t=>['contribution','deposit'].includes(t.txType)&&t.memberId===m.id).reduce((s,t)=>s+t.amount,0);
      return`<tr><td>${m.emoji} ${m.name}</td><td>${m.joined}</td><td>${fmt(tot)}</td></tr>`;
    }).join('');
    const win=window.open('','_blank');
    win.document.write(`<!DOCTYPE html><html><head><title>A2DV Fund Report</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#111;max-width:900px;margin:0 auto}h1{font-size:26px;margin-bottom:4px}h2{font-size:16px;color:#555;margin:24px 0 10px;border-bottom:1px solid #ddd;padding-bottom:4px}.summary{display:flex;gap:24px;margin:20px 0;flex-wrap:wrap}.box{background:#f9f9f9;border-radius:8px;padding:14px 20px;min-width:140px}.box-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em}.box-val{font-size:22px;font-weight:700;margin-top:4px}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#f3f3f3;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#666}td{padding:8px 10px;border-bottom:1px solid #eee}.green{color:#10b981}.red{color:#ef4444}footer{margin-top:32px;font-size:11px;color:#aaa;text-align:center}@media print{body{padding:16px}}</style></head><body>
      <h1>💰 ${state.fundName}</h1><div style="color:#888;font-size:13px">Generated on ${today()} · A2DV Boys Fund Manager</div>
      <div class="summary"><div class="box"><div class="box-label">Balance</div><div class="box-val">${fmt(balance)}</div></div><div class="box"><div class="box-label">Total In</div><div class="box-val green">${fmt(totalIn)}</div></div><div class="box"><div class="box-label">Total Out</div><div class="box-val red">${fmt(totalOut)}</div></div><div class="box"><div class="box-label">Members</div><div class="box-val">${members.length}</div></div></div>
      <h2>Members</h2><table><thead><tr><th>Name</th><th>Joined</th><th>Total Contributed</th></tr></thead><tbody>${memberRows}</tbody></table>
      <h2>Recent Transactions (last 50)</h2><table><thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th><th>Balance</th></tr></thead><tbody>${txRows}</tbody></table>
      <footer>A2DV Boys Fund Manager · Exported ${today()}</footer>
      </body></html>`);
    win.document.close();
    setTimeout(()=>win.print(),400);
    toast('PDF report opened!');
  };

  // Import
  const handleImport=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const text=await f.text();
      const data=JSON.parse(text);
      if(!data.members||!data.transactions)throw new Error('Invalid file');
      if(!confirm('This will replace ALL current data. Continue?'))return;
      dispatch({type:'IMPORT_DATA',payload:data});
      toast('Data imported successfully!');
    }catch{toast('Import failed — invalid file');}
    e.target.value='';
  };

  const exportOptions=[
    {icon:'🗃️',label:'JSON Backup',desc:'Full backup — all data, settings & members. Use to restore.',color:'var(--g2)',fn:exportJSON,btnLabel:'Download JSON'},
    {icon:'📊',label:'CSV Spreadsheet',desc:'Transaction history as spreadsheet — open in Excel or Google Sheets.',color:'var(--green2)',fn:exportCSV,btnLabel:'Download CSV'},
    {icon:'📄',label:'PDF Report',desc:'Formatted report with summary, members & transactions — ready to print.',color:'var(--red2)',fn:exportPDF,btnLabel:'Generate PDF'},
  ];

  return(
    <div>
      <div className="section-title mb-6">📤 Export & <span className="accent">Backup</span></div>

      <div className="card mb-4">
        <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,marginBottom:4}}>Fund Summary</div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>Current snapshot of your fund data</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
          {[['Members',members.length,'👥'],['Transactions',transactions.length,'🔄'],['Active Loans',loans.filter(l=>l.status==='active').length,'🤝']].map(([l,v,ic])=>(
            <div key={l} style={{textAlign:'center',padding:'12px 8px',background:'rgba(255,255,255,0.03)',borderRadius:11,border:'1px solid var(--border)'}}>
              <div style={{fontSize:22,marginBottom:4}}>{ic}</div>
              <div style={{fontFamily:'Syne',fontWeight:800,fontSize:20,color:'var(--g2)'}}>{v}</div>
              <div style={{fontSize:11,color:'var(--text3)'}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card mb-4">
        <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,marginBottom:16}}>📥 Export Data</div>
        {exportOptions.map(opt=>(
          <div key={opt.label} className="export-option">
            <div className="export-icon" style={{background:`${opt.color}18`}}>{opt.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontFamily:'Syne',fontSize:14}}>{opt.label}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{opt.desc}</div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={opt.fn} style={{flexShrink:0,fontSize:12}}><Icon n="download" s={13}/> {opt.btnLabel}</button>
          </div>
        ))}
      </div>

      {isAdmin&&(
        <div className="card" style={{borderColor:'rgba(240,180,41,0.2)'}}>
          <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,marginBottom:4,color:'var(--gold)'}}>📥 Import / Restore</div>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>Restore from a previously exported JSON backup file. This will replace all current data.</div>
          <div className="upload-area" onClick={()=>fileRef.current?.click()} style={{borderColor:'rgba(240,180,41,0.25)'}}>
            <Icon n="upload" s={28} c="var(--gold)"/>
            <div style={{fontSize:13,color:'var(--text2)',marginTop:8}}>Click to choose JSON backup file</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Only .json files exported from this app</div>
            <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Payment Page ──────────────────────────────────────────────
function PaymentPage({state,isAdmin,dispatch,toast}){
  const{qrImage,upiId}=state;
  const[newUpi,setNewUpi]=useState(upiId);
  const[uploadQr,setUploadQr]=useState(null);
  const[urlQr,setUrlQr]=useState('');
  const[qrTab,setQrTab]=useState('upload');
  const fileRef=useRef();
  const handleFile=async e=>{const f=e.target.files[0];if(!f)return;try{const d=await readFile(f);setUploadQr(d);}catch{}};
  const saveQr=()=>{
    const img=qrTab==='upload'?uploadQr:urlQr;
    if(img){dispatch({type:'SET_QR',payload:img});toast('QR saved');}
    if(newUpi!==upiId){dispatch({type:'SET_UPI',payload:newUpi});toast('UPI ID saved');}
  };
  return(
    <div>
      <div className="section-title mb-6">💳 <span className="accent">Payment</span></div>
      {(qrImage||upiId)&&(
        <div className="card mb-6" style={{textAlign:'center',borderColor:'rgba(59,130,246,0.2)'}}>
          <div style={{fontFamily:'Syne',fontWeight:800,fontSize:17,marginBottom:4}}>Pay to {state.fundName}</div>
          {upiId&&<div style={{color:'var(--text2)',fontSize:13,marginBottom:14}}>UPI: <span style={{color:'var(--g2)',fontWeight:700}}>{upiId}</span></div>}
          {qrImage&&<div style={{maxWidth:220,margin:'0 auto',padding:10,background:'white',borderRadius:14}}><img src={qrImage} style={{width:'100%',borderRadius:10}}/></div>}
          {upiId&&<div style={{marginTop:14}}><a href={`upi://pay?pa=${upiId}&pn=${encodeURIComponent(state.fundName)}`} className="btn btn-primary">📲 Open in UPI App</a></div>}
        </div>
      )}
      {isAdmin&&(
        <div className="card">
          <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,marginBottom:14}}>Manage Payment Details</div>
          <div className="mb-3"><label className="label">UPI ID</label><input className="input" placeholder="yourname@upi" value={newUpi} onChange={e=>setNewUpi(e.target.value)}/></div>
          <div className="mb-4">
            <label className="label">QR Code</label>
            <div style={{display:'flex',gap:8,marginBottom:10}}>{['upload','url'].map(t=><button key={t} className={`btn btn-sm ${qrTab===t?'btn-primary':'btn-ghost'}`} onClick={()=>setQrTab(t)}>{t==='upload'?'📁 Upload':'🔗 URL'}</button>)}</div>
            {qrTab==='upload'&&<div className="upload-area" onClick={()=>fileRef.current?.click()}>{uploadQr?<img src={uploadQr} style={{width:80,height:80,borderRadius:10,objectFit:'contain'}}/>:<><Icon n="upload" s={22} c="var(--text3)"/><div style={{fontSize:13,color:'var(--text3)',marginTop:6}}>Upload QR Image</div></>}<input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/></div>}
            {qrTab==='url'&&<input className="input" placeholder="https://example.com/qr.png" value={urlQr} onChange={e=>setUrlQr(e.target.value)}/>}
          </div>
          {qrImage&&<div className="mb-4"><label className="label">Current QR</label><div style={{maxWidth:100,padding:6,background:'white',borderRadius:10,display:'inline-block'}}><img src={qrImage} style={{width:'100%',borderRadius:6}}/></div><div><button className="btn btn-danger btn-sm mt-2" onClick={()=>{dispatch({type:'SET_QR',payload:null});toast('QR removed');}}>Remove</button></div></div>}
          <button className="btn btn-primary" onClick={saveQr}>Save Payment Details</button>
        </div>
      )}
      {!isAdmin&&!qrImage&&!upiId&&<div className="empty"><div className="empty-icon">🔒</div><div>No payment details set yet</div></div>}
    </div>
  );
}

// ── Settings Page ─────────────────────────────────────────────
function SettingsPage({state,dispatch,toast,isAdmin}){
  const[amt,setAmt]=useState(state.monthlyAmount);
  const[fundName,setFundName]=useState(state.fundName);
  const[oldP,setOldP]=useState('');const[newP,setNewP]=useState('');const[confP,setConfP]=useState('');
  const[passErr,setPassErr]=useState('');const[showOld,setShowOld]=useState(false);const[showNew,setShowNew]=useState(false);
  if(!isAdmin)return<div className="card" style={{textAlign:'center',padding:48}}><div style={{fontSize:44,marginBottom:12}}>🔐</div><div style={{fontFamily:'Syne',fontSize:18,fontWeight:800,marginBottom:8}}>Admin Only</div><div style={{color:'var(--text2)',fontSize:14}}>Settings are only accessible to admin.</div></div>;
  const saveSettings=()=>{dispatch({type:'UPDATE_SETTINGS',payload:{monthlyAmount:Number(amt),fundName}});toast('Settings saved!');};
  const changePass=()=>{
    setPassErr('');
    if(oldP!==state.adminPass){setPassErr('Current password incorrect');return;}
    if(newP.length<6){setPassErr('Min 6 characters');return;}
    if(newP!==confP){setPassErr('Passwords do not match');return;}
    dispatch({type:'CHANGE_PASS',payload:newP});toast('Password changed!');setOldP('');setNewP('');setConfP('');
  };
  return(
    <div>
      <div className="section-title mb-6">⚙️ <span className="accent">Settings</span></div>
      <div className="card mb-4">
        <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,marginBottom:14}}>Fund Settings</div>
        <div className="mb-3"><label className="label">Fund Name</label><input className="input" value={fundName} onChange={e=>setFundName(e.target.value)}/></div>
        <div className="mb-4"><label className="label">Monthly Contribution (₹)</label><input className="input" type="number" value={amt} onChange={e=>setAmt(e.target.value)}/><div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>Monthly target: {fmt(state.members.length*Number(amt||0))}</div></div>
        <button className="btn btn-primary" onClick={saveSettings}>Save Settings</button>
      </div>
      <div className="card mb-4">
        <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,marginBottom:4,display:'flex',alignItems:'center',gap:8}}><Icon n="lock" s={15} c="var(--g2)"/> Change Password</div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>Update your admin login password.</div>
        <div className="mb-3"><label className="label">Current Password</label><div style={{position:'relative'}}><input className="input" type={showOld?'text':'password'} placeholder="••••••••" value={oldP} onChange={e=>setOldP(e.target.value)} style={{paddingRight:40}}/><button onClick={()=>setShowOld(!showOld)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)'}}><Icon n={showOld?'eyeoff':'eye'} s={15}/></button></div></div>
        <div className="mb-3"><label className="label">New Password</label><div style={{position:'relative'}}><input className="input" type={showNew?'text':'password'} placeholder="Min 6 characters" value={newP} onChange={e=>setNewP(e.target.value)} style={{paddingRight:40}}/><button onClick={()=>setShowNew(!showNew)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)'}}><Icon n={showNew?'eyeoff':'eye'} s={15}/></button></div></div>
        <div className="mb-3"><label className="label">Confirm New Password</label><input className="input" type="password" placeholder="Re-enter" value={confP} onChange={e=>setConfP(e.target.value)}/></div>
        {passErr&&<div style={{color:'var(--red2)',fontSize:13,marginBottom:12,padding:'8px 12px',background:'rgba(239,68,68,0.08)',borderRadius:10}}>⚠️ {passErr}</div>}
        <button className="btn btn-primary" onClick={changePass}>Update Password</button>
      </div>
      <div className="card" style={{borderColor:'rgba(239,68,68,0.2)'}}>
        <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,marginBottom:8,color:'var(--red2)'}}>⚠️ Danger Zone</div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>Permanently deletes all data. Cannot be undone.</div>
        <button className="btn btn-danger" onClick={()=>{if(!confirm('Delete ALL data? Cannot be undone!'))return;dispatch({type:'RESET'});toast('Data reset');}}>Reset All Data</button>
      </div>
    </div>
  );
}

// ── Game Page ─────────────────────────────────────────────────
function GamePage({state}){
  const balance=state.transactions.reduce((s,t)=>['contribution','deposit','loan_repay'].includes(t.txType)?s+t.amount:s-t.amount,0);
  const unlocked=MILESTONES.filter(m=>m.amount<=balance);
  const nextMs=MILESTONES.find(m=>m.amount>balance);
  return(
    <div>
      <div className="section-title mb-2">Savings <span className="accent">Game</span> 🎮</div>
      <div style={{color:'var(--text2)',fontSize:13,marginBottom:20}}>Games are coming as separate artifacts — stay tuned! Below is your current progress.</div>
      <div className="hero-balance mb-6" style={{textAlign:'center'}}>
        <div style={{position:'relative',zIndex:1}}>
          <div style={{fontSize:48,marginBottom:8}}>{unlocked.slice(-1)[0]?.emoji||'🌱'}</div>
          <div style={{fontFamily:'Syne',fontSize:20,fontWeight:800}}>Level {unlocked.length} — {unlocked.slice(-1)[0]?.label||'Getting Started'}</div>
          <div style={{fontFamily:'Syne',fontSize:40,fontWeight:800,marginTop:10,background:'linear-gradient(90deg,var(--g1),var(--g2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{fmt(balance)}</div>
        </div>
      </div>
      <div className="card">
        <div className="section-title mb-4">Milestones</div>
        {MILESTONES.map((ms,i)=>{
          const done=balance>=ms.amount;
          const isCurrent=!done&&(i===0||balance>=MILESTONES[i-1].amount);
          const prog=done?100:Math.min((balance/ms.amount)*100,100);
          return(
            <div key={i} className={`milestone ${done?'done':''}`}>
              <div style={{fontSize:26,filter:done?'none':'grayscale(70%)'}}>{ms.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontFamily:'Syne',fontSize:14,color:done?'var(--g2)':isCurrent?'var(--gold)':'var(--text)'}}>{ms.label}</div>
                <div style={{fontSize:12,color:'var(--text2)'}}>{fmt(ms.amount)}</div>
                {isCurrent&&<div className="progress-wrap mt-2"><div className="progress-bar" style={{width:`${prog}%`,background:'linear-gradient(90deg,var(--gold),var(--gold2))'}}/></div>}
              </div>
              <div style={{fontSize:20}}>{done?'✅':isCurrent?'🎯':'🔒'}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────
function LoginPage({onLogin,adminPass}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[mode,setMode]=useState('admin');const[showP,setShowP]=useState(false);const[err,setErr]=useState('');
  const handle=()=>{
    if(mode==='view'){onLogin('viewer');return;}
    if(u==='admin'&&p===adminPass){onLogin('admin');}else setErr('Invalid credentials. Default: admin / a2dv2024');
  };
  return(
    <div className="login-wrap">
      <div className="login-orb1"/><div className="login-orb2"/>
      <div className="login-card">
        <div style={{textAlign:'center',marginBottom:26}}>
          <div style={{width:60,height:60,borderRadius:16,background:'linear-gradient(135deg,rgba(59,130,246,0.2),rgba(37,99,235,0.1))',border:'1px solid rgba(59,130,246,0.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:28}}>💰</div>
          <div style={{fontFamily:'Syne',fontSize:24,fontWeight:800,background:'linear-gradient(90deg,var(--g1),var(--g2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>A2DV Boys</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>Group Fund Manager</div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:22,background:'rgba(255,255,255,0.03)',borderRadius:12,padding:4,border:'1px solid var(--border)'}}>
          {['admin','view'].map(m=><button key={m} className={`btn ${mode===m?'btn-primary':'btn-ghost'}`} style={{flex:1,fontSize:13}} onClick={()=>{setMode(m);setErr('')}}>{m==='admin'?'🔐 Admin':'👁️ View Only'}</button>)}
        </div>
        {mode==='admin'&&<>
          <div className="mb-3"><label className="label">Username</label><input className="input" placeholder="admin" value={u} onChange={e=>{setU(e.target.value);setErr('')}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
          <div className="mb-4"><label className="label">Password</label><div style={{position:'relative'}}><input className="input" type={showP?'text':'password'} placeholder="••••••••" value={p} onChange={e=>{setP(e.target.value);setErr('')}} onKeyDown={e=>e.key==='Enter'&&handle()} style={{paddingRight:40}}/><button onClick={()=>setShowP(!showP)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)'}}><Icon n={showP?'eyeoff':'eye'} s={15}/></button></div></div>
          {err&&<div style={{color:'var(--red2)',fontSize:13,marginBottom:12,padding:'8px 12px',background:'rgba(239,68,68,0.08)',borderRadius:10}}>⚠️ {err}</div>}
        </>}
        {mode==='view'&&<div style={{textAlign:'center',padding:'6px 0 18px',color:'var(--text2)',fontSize:13}}>Read-only access — no changes allowed.</div>}
        <button className="btn btn-primary w-full" style={{height:44,fontSize:15}} onClick={handle}>{mode==='admin'?'Sign In →':'Enter as Viewer →'}</button>
        <div style={{textAlign:'center',marginTop:12,fontSize:11,color:'var(--text3)'}}>Default: admin / a2dv2024</div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(()=>load('a2dv_user',null));
  const[page,setPage]=useState('dashboard');
  const[state,dispatchRaw]=React.useReducer(reducer,null,()=>load('a2dv_state_v3',INIT_STATE));
  const[toastMsg,setToastMsg]=useState(null);

  useEffect(()=>{save('a2dv_state_v3',state)},[state]);
  const dispatch=useCallback(a=>dispatchRaw(a),[]);
  const toast=useCallback(m=>setToastMsg(m),[]);

  if(!user)return<LoginPage onLogin={r=>{setUser(r);save('a2dv_user',r);}} adminPass={state.adminPass||DEFAULT_PASS}/>;

  const isAdmin=user==='admin';
  const balance=state.transactions.reduce((s,t)=>['contribution','deposit','loan_repay'].includes(t.txType)?s+t.amount:s-t.amount,0);

  const NAV=[
    {id:'dashboard',label:'Dashboard',icon:'dashboard'},
    {id:'members',label:'Members',icon:'members'},
    {id:'loans',label:'Loans',icon:'loans'},
    {id:'history',label:'History',icon:'history'},
    {id:'payment',label:'Payment',icon:'payment'},
    {id:'export',label:'Export',icon:'export'},
    {id:'game',label:'Game',icon:'game'},
    {id:'settings',label:'Settings',icon:'settings'},
  ];

  return(
    <div>
      <nav className="nav">
        <div className="nav-logo"><span style={{fontSize:20}}>💰</span>{state.fundName}</div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span className="badge badge-blue hide-mobile">{fmt(balance)}</span>
          <span className={`badge ${isAdmin?'badge-gold':'badge-blue'} hide-mobile`}>{isAdmin?'Admin':'Viewer'}</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setUser(null);save('a2dv_user',null);}}><Icon n="logout" s={14}/><span className="hide-mobile" style={{marginLeft:4}}>Logout</span></button>
        </div>
      </nav>

      <div className="sidebar">
        <div style={{padding:'8px 12px 14px',marginBottom:8,borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>Balance</div>
          <div style={{fontFamily:'Syne',fontSize:21,fontWeight:800,color:'var(--g2)'}}>{fmt(balance)}</div>
          <div style={{display:'flex',gap:5,marginTop:8,flexWrap:'wrap'}}>
            {state.members.slice(0,5).map(m=><Avatar key={m.id} member={m} size={22} radius={6}/>)}
            {state.members.length>5&&<div style={{width:22,height:22,borderRadius:6,background:'var(--card3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'var(--text2)',fontWeight:700}}>+{state.members.length-5}</div>}
          </div>
        </div>
        {NAV.map(item=>(
          <button key={item.id} className={`sidebar-item ${page===item.id?'active':''}`} onClick={()=>setPage(item.id)}>
            <span className="s-icon"><Icon n={item.icon} s={15}/></span>{item.label}
          </button>
        ))}
        <div style={{marginTop:'auto',paddingTop:14,borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:11,color:'var(--text3)',padding:'0 12px'}}>{isAdmin?'🔐 Admin':'👁️ View Only'}</div>
        </div>
      </div>

      <div className="main">
        {page==='dashboard'&&<Dashboard state={state} isAdmin={isAdmin} dispatch={dispatch} toast={toast}/>}
        {page==='members'&&<MembersPage state={state} isAdmin={isAdmin} dispatch={dispatch} toast={toast}/>}
        {page==='loans'&&<LoansPage state={state} isAdmin={isAdmin} dispatch={dispatch} toast={toast}/>}
        {page==='history'&&<HistoryPage state={state} isAdmin={isAdmin} dispatch={dispatch} toast={toast}/>}
        {page==='payment'&&<PaymentPage state={state} isAdmin={isAdmin} dispatch={dispatch} toast={toast}/>}
        {page==='export'&&<ExportPage state={state} isAdmin={isAdmin} dispatch={dispatch} toast={toast}/>}
        {page==='game'&&<GamePage state={state}/>}
        {page==='settings'&&<SettingsPage state={state} dispatch={dispatch} toast={toast} isAdmin={isAdmin}/>}
      </div>

      <div className="bottom-nav">
        {NAV.map(item=>(
          <button key={item.id} className={`bottom-nav-item ${page===item.id?'active':''}`} onClick={()=>setPage(item.id)}>
            <Icon n={item.icon} s={18}/>{item.label}
          </button>
        ))}
      </div>

      {toastMsg&&<Toast msg={toastMsg} onDone={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
