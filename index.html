<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A2DV Boys Fund Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#131a24;
  --card:#111827;--card2:#1a2336;--card3:#1e2a3d;
  --border:#1f2d42;--border2:#263347;
  --g1:#3b82f6;--g2:#60a5fa;--g3:#93c5fd;
  --g-dim:#1e3a5f;--g-glow:rgba(59,130,246,0.15);
  --gold:#f0b429;--gold2:#fbbf24;
  --green:#10b981;--green2:#34d399;
  --red:#ef4444;--red2:#f87171;
  --purple:#a78bfa;--orange:#fb923c;
  --text:#e8eaf0;--text2:#7a9bbf;--text3:#2e4a6e;
  --radius:16px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.w-full{width:100%}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.mt-2{margin-top:8px}.mt-4{margin-top:16px}
.text-sm{font-size:13px}.text-xs{font-size:11px}
.font-bold{font-weight:700}.font-semibold{font-weight:600}
.rounded{border-radius:var(--radius)}.cursor-pointer{cursor:pointer}
.card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border2);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:all .2s}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,0.03),transparent 60%);pointer-events:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;outline:none}
.btn-primary{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-weight:700}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 4px 20px rgba(59,130,246,0.4)}
.btn-ghost{background:rgba(255,255,255,0.04);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.btn-danger{background:rgba(239,68,68,0.1);color:var(--red2);border:1px solid rgba(239,68,68,0.2)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-success{background:rgba(16,185,129,0.1);color:var(--green2);border:1px solid rgba(16,185,129,0.2)}
.btn-success:hover{background:rgba(16,185,129,0.2)}
.btn-gold{background:rgba(240,180,41,0.1);color:var(--gold);border:1px solid rgba(240,180,41,0.2)}
.btn-gold:hover{background:rgba(240,180,41,0.2)}
.btn-purple{background:rgba(167,139,250,0.1);color:var(--purple);border:1px solid rgba(167,139,250,0.2)}
.btn-purple:hover{background:rgba(167,139,250,0.2)}
.btn-orange{background:rgba(251,146,60,0.1);color:var(--orange);border:1px solid rgba(251,146,60,0.2)}
.btn-orange:hover{background:rgba(251,146,60,0.2)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:10px}
.btn-icon{padding:8px;border-radius:10px;width:36px;height:36px}
.input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:12px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .18s}
.input:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.input::placeholder{color:var(--text3)}
.label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.06em}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-blue{background:rgba(59,130,246,0.12);color:var(--g2);border:1px solid rgba(59,130,246,0.2)}
.badge-green{background:rgba(16,185,129,0.12);color:var(--green2);border:1px solid rgba(16,185,129,0.2)}
.badge-red{background:rgba(239,68,68,0.12);color:var(--red2);border:1px solid rgba(239,68,68,0.2)}
.badge-gold{background:rgba(240,180,41,0.1);color:var(--gold);border:1px solid rgba(240,180,41,0.2)}
.badge-purple{background:rgba(167,139,250,0.1);color:var(--purple);border:1px solid rgba(167,139,250,0.2)}
.badge-orange{background:rgba(251,146,60,0.1);color:var(--orange);border:1px solid rgba(251,146,60,0.2)}
.progress-wrap{background:rgba(255,255,255,0.06);border-radius:99px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--g1),var(--g2));transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(59,130,246,0.4)}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(7,9,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(90deg,var(--g1),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px}
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:20px 12px;position:fixed;top:62px;left:0;bottom:0;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;border:none;background:transparent;font-family:'DM Sans',sans-serif;width:100%;text-align:left}
.sidebar-item:hover{background:rgba(59,130,246,0.06);color:var(--text)}
.sidebar-item.active{background:rgba(59,130,246,0.12);color:var(--g2);border:1px solid rgba(59,130,246,0.2)}
.sidebar-item .s-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sidebar-item.active .s-icon{background:rgba(59,130,246,0.15)}
.main{flex:1;margin-left:230px;padding:28px;min-height:calc(100vh - 62px);width:calc(100% - 230px)}
.login-wrap{min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow-y:auto;overflow-x:hidden;padding:24px 16px}
.login-orb1{position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.12),transparent 70%);pointer-events:none}
.login-orb2{position:absolute;bottom:-150px;left:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,0.07),transparent 70%);pointer-events:none}
.login-card{position:relative;z-index:1;background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border2);border-radius:24px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.stat-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border2);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:all .2s}
.stat-card:hover{border-color:var(--g-dim);box-shadow:0 8px 32px var(--g-glow)}
.stat-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;margin:8px 0 4px}
.stat-label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.stat-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.avatar{border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--card3);font-size:20px;font-family:'Syne',sans-serif;font-weight:800;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover}
.tx-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hero-balance{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(37,99,235,0.04));border:1px solid rgba(59,130,246,0.2);border-radius:22px;padding:28px;position:relative;overflow:hidden;margin-bottom:24px}
.hero-balance::before{content:'';position:absolute;top:-60px;right:-60px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.15),transparent 70%);pointer-events:none}
.hero-amount{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;background:linear-gradient(90deg,var(--g1),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.chart-wrap{position:relative;height:150px;margin-top:8px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:100%;padding-bottom:22px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.chart-bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height .6s cubic-bezier(.4,0,.2,1);position:relative}
.chart-label{font-size:10px;color:var(--text3);position:absolute;bottom:-18px;white-space:nowrap;left:50%;transform:translateX(-50%)}
.milestone{display:flex;align-items:center;gap:12px;padding:11px 14px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;transition:all .2s}
.milestone.done{border-color:rgba(59,130,246,0.25);background:rgba(59,130,246,0.04)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border2);border-radius:22px;padding:26px;width:100%;max-width:460px;box-shadow:0 24px 80px rgba(0,0,0,0.7);animation:fadeUp .22s ease;max-height:90vh;overflow-y:auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(7,9,15,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border2);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:100;gap:2px}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;border-radius:10px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:600;transition:all .15s;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.bottom-nav-item.active{color:var(--g2);background:rgba(59,130,246,0.1)}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.section-title .accent{color:var(--g2)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--text2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid rgba(31,45,66,0.4);color:var(--text)}
tr:hover td{background:rgba(59,130,246,0.02)}
.empty{text-align:center;padding:48px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--card2),var(--card3));border:1px solid rgba(59,130,246,0.3);border-radius:14px;padding:11px 22px;font-size:13px;font-weight:600;color:var(--g2);z-index:999;animation:toastIn .25s ease;box-shadow:0 8px 32px rgba(0,0,0,0.5);white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toggle{width:44px;height:24px;border-radius:99px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle-on{background:linear-gradient(90deg,var(--g1),var(--g2))}
.toggle-off{background:var(--border2)}
.toggle::after{content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
.toggle-on::after{left:23px}.toggle-off::after{left:3px}
.upload-area{border:2px dashed var(--border2);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,0.02)}
.upload-area:hover{border-color:var(--g1);background:rgba(59,130,246,0.04)}
.qr-box{width:100%;aspect-ratio:1;background:rgba(255,255,255,0.03);border:2px dashed var(--border2);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text3);font-size:13px;cursor:pointer;transition:all .2s;overflow:hidden}
.qr-box:hover{border-color:var(--g1)}
.qr-box img{width:100%;height:100%;object-fit:contain;border-radius:12px}
/* Type selector */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.type-btn{padding:10px 6px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.02);cursor:pointer;text-align:center;transition:all .15s;font-family:'DM Sans',sans-serif}
.type-btn:hover{border-color:var(--border2);background:rgba(255,255,255,0.05)}
.type-btn.selected{border-color:var(--g1);background:rgba(59,130,246,0.1)}
.type-btn .t-icon{font-size:20px;margin-bottom:4px}
.type-btn .t-label{font-size:11px;font-weight:700;color:var(--text2)}
.type-btn.selected .t-label{color:var(--g2)}
/* Export card */
.export-option{display:flex;align-items:center;gap:14px;padding:16px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;transition:all .2s;cursor:pointer}
.export-option:hover{border-color:var(--border2);background:rgba(255,255,255,0.04)}
.export-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
/* Loan card */
.loan-card{background:rgba(167,139,250,0.05);border:1px solid rgba(167,139,250,0.2);border-radius:14px;padding:14px;margin-bottom:10px}
@media(max-width:768px){
  .sidebar{display:none}.main{margin-left:0;padding:16px 16px 88px;width:100%}
  .nav{padding:0 16px}.bottom-nav{display:flex}
  .grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}.hide-mobile{display:none}
  .hero-amount{font-size:36px}.type-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

const DEFAULT_PASS='a2dv2024';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MILESTONES=[
  {amount:1000,label:'First Thousand',emoji:'🎯'},{amount:5000,label:'High Five!',emoji:'🙌'},
  {amount:10000,label:'Five Figures',emoji:'💎'},{amount:25000,label:'Quarter Lakh',emoji:'🚀'},
  {amount:50000,label:'Half Lakh!',emoji:'🏆'},{amount:100000,label:'One Lakh Club',emoji:'👑'},
];
const INIT_MEMBERS=[
  {id:1,name:'Arjun',emoji:'🦁',color:'#3b82f6',photo:null,joined:'2024-01'},
  {id:2,name:'Aditya',emoji:'🐺',color:'#60a5fa',photo:null,joined:'2024-01'},
  {id:3,name:'Dhruv',emoji:'🦊',color:'#10b981',photo:null,joined:'2024-01'},
  {id:4,name:'Viren',emoji:'🐉',color:'#a78bfa',photo:null,joined:'2024-01'},
];
const COLORS=['#3b82f6','#60a5fa','#10b981','#a78bfa','#f0b429','#f87171','#fb923c','#34d399'];
const EMOJIS=['🦁','🐺','🦊','🐉','🐯','🦅','🐻','🦈','🐸','🦉'];
const EXP_CATS=['Food 🍕','Travel ✈️','Celebration 🎉','Emergency 🆘','Investment 📈','Shopping 🛍️','Other 💡'];
const INIT_STATE={
  members:INIT_MEMBERS,transactions:[],monthlyContributions:{},
  monthlyAmount:200,fundName:'A2DV Boys Fund',
  qrImage:null,upiId:'',adminPass:DEFAULT_PASS,loans:[],
};

// ── Helpers ──────────────────────────────────────────────────
const fmt=n=>'₹'+Number(n).toLocaleString('en-IN');
const today=()=>new Date().toISOString().slice(0,10);
const tmk=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function readFile(f){return new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=()=>j();rd.readAsDataURL(f);})}

// ── TX type config ────────────────────────────────────────────
const TX_TYPES={
  contribution:{label:'Contribution',icon:'💳',color:'var(--g2)',badge:'badge-blue',sign:'+'},
  deposit:{label:'Extra Deposit',icon:'💰',color:'var(--green2)',badge:'badge-green',sign:'+'},
  expense:{label:'Expense',icon:'💸',color:'var(--red2)',badge:'badge-red',sign:'-'},
  withdrawal:{label:'Withdrawal',icon:'🏧',color:'var(--orange)',badge:'badge-orange',sign:'-'},
  loan_given:{label:'Loan Given',icon:'🤝',color:'var(--purple)',badge:'badge-purple',sign:'-'},
  loan_repay:{label:'Loan Repaid',icon:'✅',color:'var(--green2)',badge:'badge-green',sign:'+'},
};

// ── Reducer ───────────────────────────────────────────────────
function reducer(state,action){
  switch(action.type){
    case 'ADD_TX':{
      const tx={...action.payload,id:Date.now()};
      const mc=action.payload.monthKey?{...state.monthlyContributions,[action.payload.monthKey]:true}:state.monthlyContributions;
      return{...state,transactions:[...state.transactions,tx],monthlyContributions:mc};
    }
    case 'DELETE_TX':return{...state,transactions:state.transactions.filter(t=>t.id!==action.payload)};
    case 'ADD_MEMBER':return{...state,members:[...state.members,action.payload]};
    case 'REMOVE_MEMBER':return{...state,members:state.members.filter(m=>m.id!==action.payload)};
    case 'UPDATE_MEMBER':return{...state,members:state.members.map(m=>m.id===action.payload.id?{...m,...action.payload}:m)};
    case 'ADD_LOAN':return{...state,loans:[...state.loans,{...action.payload,id:Date.now(),status:'active'}]};
    case 'REPAY_LOAN':{
      const loans=state.loans.map(l=>l.id===action.payload.id?{...l,paidAmount:(l.paidAmount||0)+action.payload.amount,status:(l.paidAmount||0)+action.payload.amount>=l.amount?'settled':'active'}:l);
      return{...state,loans};
    }
    case 'UPDATE_SETTINGS':return{...state,...action.payload};
    case 'SET_QR':return{...state,qrImage:action.payload};
    case 'SET_UPI':return{...state,upiId:action.payload};
    case 'CHANGE_PASS':return{...state,adminPass:action.payload};
    case 'IMPORT_DATA':return{...INIT_STATE,...action.payload};
    case 'RESET':return{...INIT_STATE};
    default:return state;
  }
}

// ── Icons ─────────────────────────────────────────────────────
const Icon=({n,s=18,c})=>{
  const ic={
    dashboard:<svg width={s} height={s} fill="none" stroke={c||"currentColor"} strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,

    settings:<svg width={s} height={s} fill="none" stroke={c||"currentColor"} strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
    export:<svg width={s} height={s} fill="none" stroke={c||"currentColor"} strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,

};

// ── Toast ─────────────────────────────────────────────────────
function Toast({msg,onDone}){useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t)},[]);return<div className="toast">✦ {msg}</div>;}

// ── Modal ─────────────────────────────────────────────────────
function Modal({title,onClose,children,wide}){
  useEffect(()=>{const h=e=>e.key==='Escape'&&onClose();window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[]);
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={wide?{maxWidth:540}:{}}>
        <div className="flex items-center justify-between mb-4">
          <h3 style={{fontFamily:'Syne',fontSize:16,fontWeight:800}}>{title}</h3>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><Icon n="x" s={14}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Avatar ────────────────────────────────────────────────────
function Avatar({member,size=44,radius=12}){
  return(
    <div className="avatar" style={{width:size,height:size,borderRadius:radius,background:`${member.color}18`,color:member.color}}>
      {member.photo?<img src={member.photo} alt={member.name}/>:<span style={{fontSize:size*.44}}>{member.emoji}</span>}
    </div>
  );
}

// ── Add Transaction Modal ─────────────────────────────────────
function AddTxModal({state,dispatch,onClose,toast,defaultType}){
  const{members,monthlyAmount}=state;
  const[txType,setTxType]=useState(defaultType||'contribution');
  const[amt,setAmt]=useState(txType==='contribution'?monthlyAmount:'');
  const[desc,setDesc]=useState('');
  const[date,setDate]=useState(today());
  const[cat,setCat]=useState('Food 🍕');
  const[memberId,setMemberId]=useState('');
  const[selMembers,setSelMembers]=useState(members.map(m=>m.id));
  const[note,setNote]=useState('');

  const tm=tmk();
  const toggleSel=id=>setSelMembers(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);

  const typeConfig=[
    {k:'contribution',icon:'💳',label:'Monthly'},
    {k:'deposit',icon:'💰',label:'Deposit'},
    {k:'expense',icon:'💸',label:'Expense'},
    {k:'withdrawal',icon:'🏧',label:'Withdraw'},
    {k:'loan_given',icon:'🤝',label:'Loan Out'},
    {k:'loan_repay',icon:'✅',label:'Loan In'},
  ];

  const isIncome=['contribution','deposit','loan_repay'].includes(txType);

  const submit=()=>{
    const a=Number(amt);
    if(!a||a<=0)return;
    if(txType==='contribution'){
      selMembers.forEach(id=>{
        const m=members.find(x=>x.id===id);
        dispatch({type:'ADD_TX',payload:{txType:'contribution',memberId:id,memberName:m.name,amount:a,date,description:`${m.name}${note?` — ${note}`:' contribution'}`,monthKey:`${tm}-${id}`}});
      });
      toast(`${selMembers.length} contribution(s) added`);
    } else if(txType==='expense'){
      dispatch({type:'ADD_TX',payload:{txType:'expense',amount:a,description:`💸 ${desc||cat}`,date,category:cat}});
      toast('Expense recorded');
    } else if(txType==='deposit'){
      const m=memberId?members.find(x=>x.id==memberId):null;
      dispatch({type:'ADD_TX',payload:{txType:'deposit',memberId:m?.id,memberName:m?.name,amount:a,date,description:`💰 ${m?m.name+' — ':''}${desc||'Extra deposit'}`}});
      toast('Deposit recorded');
    } else if(txType==='withdrawal'){
      const m=memberId?members.find(x=>x.id==memberId):null;
      dispatch({type:'ADD_TX',payload:{txType:'withdrawal',memberId:m?.id,memberName:m?.name,amount:a,date,description:`🏧 ${m?m.name+' — ':''}${desc||'Withdrawal'}`}});
      toast('Withdrawal recorded');
    } else if(txType==='loan_given'){
      const m=memberId?members.find(x=>x.id==memberId):null;
      dispatch({type:'ADD_TX',payload:{txType:'loan_given',memberId:m?.id,memberName:m?.name,amount:a,date,description:`🤝 Loan to ${m?m.name:(desc||'Member')}`}});
      if(m) dispatch({type:'ADD_LOAN',payload:{borrowerId:m.id,borrowerName:m.name,amount:a,date,note:desc,paidAmount:0}});
      toast('Loan recorded');
    } else if(txType==='loan_repay'){
      const m=memberId?members.find(x=>x.id==memberId):null;
      dispatch({type:'ADD_TX',payload:{txType:'loan_repay',memberId:m?.id,memberName:m?.name,amount:a,date,description:`✅ Repayment from ${m?m.name:(desc||'Member')}`}});
      toast('Repayment recorded');
    }
    onClose();
  };

  return(
    <Modal title="➕ Add Transaction" onClose={onClose} wide>
      <div className="type-grid mb-4">
        {typeConfig.map(t=>(
          <div key={t.k} className={`type-btn ${txType===t.k?'selected':''}`} onClick={()=>{setTxType(t.k);if(t.k==='contribution')setAmt(monthlyAmount);}}>
            <div className="t-icon">{t.icon}</div>
            <div className="t-label">{t.label}</div>
          </div>
        ))}
      </div>

      {txType==='contribution'&&(
        <>
          <div className="mb-3"><label className="label">Amount per Member (₹)</label><input className="input" type="number" value={amt} onChange={e=>setAmt(e.target.value)}/></div>
          <div className="mb-3"><label className="label">Note</label><input className="input" placeholder="Optional note" value={note} onChange={e=>setNote(e.target.value)}/></div>
          <div className="mb-3">
            <label className="label">Select Members</label>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {members.map(m=>(
                <div key={m.id} onClick={()=>toggleSel(m.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:selMembers.includes(m.id)?'rgba(59,130,246,0.08)':'rgba(255,255,255,0.02)',border:`1px solid ${selMembers.includes(m.id)?'rgba(59,130,246,0.3)':'var(--border)'}`,borderRadius:11,cursor:'pointer',transition:'all .15s'}}>
                  <Avatar member={m} size={28} radius={7}/>
                  <span style={{flex:1,fontWeight:600,fontSize:14}}>{m.name}</span>
                  <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${selMembers.includes(m.id)?'var(--g1)':'var(--border2)'}`,background:selMembers.includes(m.id)?'var(--g1)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    {selMembers.includes(m.id)&&<Icon n="check" s={10} c="#fff"/>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}

      {['deposit','withdrawal','loan_given','loan_repay'].includes(txType)&&(
        <>
          <div className="mb-3"><label className="label">Amount (₹)</label><input className="input" type="number" placeholder="Enter amount" value={amt} onChange={e=>setAmt(e.target.value)}/></div>
          <div className="mb-3">
            <label className="label">Member (optional)</label>
            <select className="input" value={memberId} onChange={e=>setMemberId(e.target.value)}>
              <option value="">— No specific member —</option>
              {members.map(m=><option key={m.id} value={m.id}>{m.emoji} {m.name}</option>)}
            </select>
          </div>
          <div className="mb-3"><label className="label">Description</label><input className="input" placeholder={txType==='deposit'?'Reason for deposit':txType==='withdrawal'?'Reason for withdrawal':'Note'} value={desc} onChange={e=>setDesc(e.target.value)}/></div>
        </>
      )}

      {txType==='expense'&&(
        <>
          <div className="mb-3"><label className="label">Amount (₹)</label><input className="input" type="number" placeholder="Enter amount" value={amt} onChange={e=>setAmt(e.target.value)}/></div>
          <div className="mb-3">
            <label className="label">Category</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
              {EXP_CATS.map(c=>(
                <button key={c} className={`btn btn-sm ${cat===c?'btn-danger':'btn-ghost'}`} onClick={()=>setCat(c)} style={{fontSize:12}}>{c}</button>
              ))}
            </div>
          </div>
          <div className="mb-3"><label className="label">Description</label><input className="input" placeholder="What was it for?" value={desc} onChange={e=>setDesc(e.target.value)}/></div>
        </>
      )}

      <div className="mb-4"><label className="label">Date</label><input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>

      <div style={{padding:'10px 14px',background:'rgba(255,255,255,0.03)',borderRadius:11,border:'1px solid var(--border)',marginBottom:16,fontSize:13,color:'var(--text2)'}}>
        <span style={{color:isIncome?'var(--green2)':'var(--red2)',fontWeight:700,fontFamily:'Syne'}}>{isIncome?'+ Income':'- Deduction'}</span> · {TX_TYPES[txType]?.label}
      </div>

      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" style={{flex:1}} onClick={submit} disabled={!amt}>Add {fmt(amt||0)}</button>
      </div>
    </Modal>
  );
}

// ── Dashboard ─────────────────────────────────────────────────
function Dashboard({state,isAdmin,dispatch,toast}){
  const{transactions,members,monthlyAmount,monthlyContributions}=state;
  const[showTx,setShowTx]=useState(false);
  const[txType,setTxType]=useState('contribution');

  const balance=useMemo(()=>transactions.reduce((s,t)=>['contribution','deposit','loan_repay'].includes(t.txType)?s+t.amount:s-t.amount,0),[transactions]);
  const totalIn=useMemo(()=>transactions.filter(t=>['contribution','deposit','loan_repay'].includes(t.txType)).reduce((s,t)=>s+t.amount,0),[transactions]);
  const totalOut=useMemo(()=>transactions.filter(t=>['expense','withdrawal','loan_given'].includes(t.txType)).reduce((s,t)=>s+t.amount,0),[transactions]);
  const tm=tmk();
  const thisMonthIn=transactions.filter(t=>t.date.startsWith(tm)&&['contribution','deposit'].includes(t.txType)).reduce((s,t)=>s+t.amount,0);

  const now=new Date();
  const chartData=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const inc=transactions.filter(t=>t.date.startsWith(k)&&['contribution','deposit'].includes(t.txType)).reduce((s,t)=>s+t.amount,0);
    chartData.push({label:MONTHS[d.getMonth()],value:inc});
  }
  const maxC=Math.max(...chartData.map(d=>d.value),1);

  const nextMs=MILESTONES.find(m=>m.amount>balance);
  const prevMs=MILESTONES.filter(m=>m.amount<=balance).slice(-1)[0];
  const msP=nextMs?((balance-(prevMs?.amount||0))/(nextMs.amount-(prevMs?.amount||0)))*100:100;
  const unpaid=members.filter(m=>!monthlyContributions[`${tm}-${m.id}`]);

  const openTx=type=>{setTxType(type);setShowTx(true);};

  return(
    <div>
      <div className="hero-balance">
        <div style={{position:'relative',zIndex:1}}>
          <div style={{fontSize:11,color:'var(--text2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>💰 Total Fund Balance</div>
          <div className="hero-amount">{fmt(balance)}</div>
          <div style={{display:'flex',gap:20,marginTop:14,flexWrap:'wrap'}}>
            {[['Total In',totalIn,'var(--green2)','⬆'],['Total Out',totalOut,'var(--red2)','⬇'],['This Month',thisMonthIn,'var(--g2)','📅']].map(([l,v,c,ic])=>(
              <div key={l}><div style={{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>{ic} {l}</div><div style={{color:c,fontWeight:800,fontFamily:'Syne',fontSize:17}}>{fmt(v)}</div></div>
            ))}
          </div>
          {isAdmin&&(
            <div style={{display:'flex',gap:8,marginTop:18,flexWrap:'wrap'}}>
              <button className="btn btn-primary btn-sm" onClick={()=>openTx('contribution')}><Icon n="plus" s={13}/> Contribution</button>
              <button className="btn btn-success btn-sm" onClick={()=>openTx('deposit')}>💰 Deposit</button>
              <button className="btn btn-danger btn-sm" onClick={()=>openTx('expense')}>💸 Expense</button>
              <button className="btn btn-orange btn-sm" onClick={()=>openTx('withdrawal')}>🏧 Withdraw</button>
              <button className="btn btn-purple btn-sm" onClick={()=>openTx('loan_given')}>🤝 Loan</button>
            </div>
          )}
        </div>
      </div>

      <div className="grid-4 mb-6">
        {[['Members',members.length,'👥','var(--g2)'],['Monthly Target',fmt(members.length*monthlyAmount),'📊','var(--green2)'],['Transactions',transactions.length,'🔄','#60a5fa'],['Per Member',fmt(monthlyAmount),'💎','var(--purple)']].map(([l,v,ic,c])=>(
          <div key={l} className="stat-card"><div className="stat-icon" style={{background:`${c}18`}}>{ic}</div><div className="stat-label">{l}</div><div className="stat-value" style={{color:c}}>{v}</div></div>
        ))}
      </div>

      <div className="grid-2 mb-6">
        <div className="card">
          <div className="section-title">Monthly <span className="accent">Activity</span></div>
          <div className="chart-wrap">
            <div className="chart-bars">
              {chartData.map((d,i)=>(
                <div key={i} className="chart-bar-wrap">
                  <div style={{position:'relative',width:'100%',height:'calc(100% - 26px)',display:'flex',alignItems:'flex-end'}}>
                    <div className="chart-bar" style={{height:`${Math.max(4,(d.value/maxC)*100)}%`,background:'linear-gradient(180deg,var(--g1),rgba(59,130,246,0.2))',boxShadow:d.value>0?'0 0 10px rgba(59,130,246,0.3)':''}}/>
                    <span className="chart-label">{d.label}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="card">
          <div className="section-title">Next <span className="accent">Milestone</span></div>
          {nextMs?(
            <>
              <div style={{textAlign:'center',marginBottom:14}}>
                <div style={{fontSize:38,marginBottom:6}}>{nextMs.emoji}</div>
                <div style={{fontFamily:'Syne',fontSize:17,fontWeight:800}}>{nextMs.label}</div>
                <div style={{color:'var(--text2)',fontSize:13}}>{fmt(nextMs.amount)}</div>
              </div>
              <div className="progress-wrap mb-2"><div className="progress-bar" style={{width:`${Math.min(msP,100)}%`}}/></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)'}}><span>{fmt(balance)}</span><span>{Math.round(msP)}%</span><span>{fmt(nextMs.amount)}</span></div>
              <div style={{marginTop:10,textAlign:'center',fontSize:12,color:'var(--text2)'}}>{fmt(nextMs.amount-balance)} to go!</div>
            </>
          ):<div style={{textAlign:'center',padding:20}}><div style={{fontSize:38}}>👑</div><div style={{fontFamily:'Syne',fontSize:16,fontWeight:800,marginTop:8}}>All Milestones Unlocked!</div></div>}
        </div>
      </div>

      <div className="card mb-6">
        <div className="section-title">Recent <span className="accent">Transactions</span></div>
        {transactions.length===0
          ?<div className="empty"><div className="empty-icon">📭</div><div>No transactions yet</div></div>
          :transactions.slice(-8).reverse().map((tx,i)=>{
            const cfg=TX_TYPES[tx.txType]||TX_TYPES.contribution;
            const isIn=['contribution','deposit','loan_repay'].includes(tx.txType);
            return(
              <div key={i} className="tx-row">
                <div className="tx-icon" style={{background:isIn?'rgba(16,185,129,0.12)':'rgba(239,68,68,0.12)'}}>{cfg.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{tx.description}</div>
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{tx.date} · {cfg.label}</div>
                </div>
                <div style={{fontFamily:'Syne',fontWeight:800,fontSize:16,color:isIn?'var(--green2)':'var(--red2)'}}>{cfg.sign}{fmt(tx.amount)}</div>
              </div>
            );
          })
        }
      </div>

      {isAdmin&&unpaid.length>0&&(
        <div className="card" style={{borderColor:'rgba(239,68,68,0.2)',background:'rgba(239,68,68,0.03)'}}>
          <div className="flex items-center gap-3 mb-3"><Icon n="bell" s={15} c="var(--red2)"/><span style={{fontFamily:'Syne',fontWeight:700,color:'var(--red2)'}}>Pending This Month</span></div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:8}}>
            {unpaid.map(m=>(
              <div key={m.id} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:99}}>
                <Avatar member={m} size={18} radius={5}/><span style={{fontSize:12,fontWeight:600,color:'var(--red2)'}}>{m.name}</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:12,color:'var(--text2)'}}>{unpaid.length} member{unpaid.length>1?'s':''} haven't contributed this month.</div>
